<ion-header class="ion-no-border">
  <ion-toolbar mode="ios">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/profile" text="Atrás"></ion-back-button>
    </ion-buttons>
    <ion-title>Vincular Pareja</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="qr-container">
    <!-- TARJETA DE VINCULACIÓN QR -->
    <ion-card class="qr-linking-card">
      <ion-card-content class="qr-card-content">
        <ion-icon name="heart-outline" class="heart-icon" color="danger"></ion-icon>
        <h3 class="qr-title">Vincular con tu Pareja</h3>
        <p class="qr-subtitle">Muestra este código a tu pareja desde su teléfono para conectar sus cuentas.</p>
        
        <div class="qr-wrapper">
          <!-- Componente QR -->
          <qrcode [qrdata]="qrData" [width]="200" [errorCorrectionLevel]="'M'"></qrcode>
        </div>

        <ion-button expand="block" class="scan-btn" (click)="openScanner()">
          <ion-icon slot="start" name="scan-outline"></ion-icon>
          Escanear QR de mi Pareja
        </ion-button>
      </ion-card-content>
    </ion-card>
  </div>

  <!-- MODAL DE ESCÁNER DE QR -->
  <ion-modal [isOpen]="isScannerOpen" (didDismiss)="closeScanner()" (ionModalDidPresent)="onModalDidPresent()">
    <ng-template>
      <ion-header class="ion-no-border scanner-header">
        <ion-toolbar color="transparent">
          <ion-title class="scanner-title">Apunta al código</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="closeScanner()" color="light">Cancelar</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      
      <ion-content class="scanner-content">
        <div class="scanner-backdrop">
          <!-- Contenedor donde se insertará el lector de QR real -->
          <div id="qr-reader" style="width: 100%; max-width: 600px; margin: 0 auto;"></div>
          
          <p class="scanner-helper-text">Coloca el código QR de tu pareja en el recuadro para escanearlo automáticamente.</p>
        </div>
      </ion-content>
    </ng-template>
  </ion-modal>
</ion-content>
