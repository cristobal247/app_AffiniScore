<ion-content [fullscreen]="true">
  <div class="register-container">
    
    <div class="back-header">
      <ion-back-button defaultHref="login" text="" color="danger"></ion-back-button>
      <span class="back-text">Volver al inicio</span>
    </div>

    <div class="header-titles">
      <h1>Crea tu cuenta</h1>
      <p>Comienza la aventura con tu pareja <span class="dot">•</span></p>
    </div>

    <ion-card class="register-card">
      
      <div class="input-group">
        <ion-label class="custom-label">¿CÓMO TE LLAMAS?</ion-label>
        <ion-item lines="none" class="custom-item">
          <ion-input type="text" [(ngModel)]="nombre" placeholder="Tu nombre o apodo"></ion-input>
          <ion-icon name="person-outline" slot="end" class="input-icon"></ion-icon>
        </ion-item>
      </div>

      <div class="input-group">
        <ion-label class="custom-label">CORREO ELECTRÓNICO</ion-label>
        <ion-item lines="none" class="custom-item">
          <ion-input type="email" [(ngModel)]="email" placeholder="amor@ejemplo.com"></ion-input>
          <ion-icon name="mail-outline" slot="end" class="input-icon"></ion-icon>
        </ion-item>
      </div>

      <div class="input-group">
        <ion-label class="custom-label">CONTRASEÑA</ion-label>
        <ion-item lines="none" class="custom-item">
          <ion-input type="password" [(ngModel)]="password" placeholder="Mínimo 6 caracteres"></ion-input>
          <ion-icon name="lock-closed-outline" slot="end" class="input-icon"></ion-icon>
        </ion-item>
      </div>

      <div class="terms-text">
        <p>Al registrarte, aceptas nuestros <span>Términos y Privacidad</span></p>
      </div>

      <ion-button expand="block" class="main-btn" (click)="onRegister()">
        Crear mi cuenta
      </ion-button>
    </ion-card>

    <div class="divider">
      <span>O regístrate con</span>
    </div>

    <div class="social-row">
      <div class="social-btn">
        <img src="assets/images/google_icon.png">
      </div>
      <div class="social-btn">
        <img src="assets/images/apple_icon.png">
      </div>
    </div>

    <div class="footer-text">
      <p>¿Ya tienes cuenta? <span class="login-link" (click)="goToLogin()">Inicia Sesión</span></p>
    </div>

  </div>
</ion-content>
